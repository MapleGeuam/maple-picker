<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플 직업 무작위 뽑기 Pro</title>
    <style>
        :root { 
            --main-color: #f39c12; 
            --stop-color: #e74c3c; 
            --bg-color: #f5f6fa; 
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 420px; 
        }
        
        h1 { 
            color: var(--main-color); 
            margin: 0 0 5px 0; 
            font-size: 26px; 
        }
        
        #counter { 
            color: #aaa; 
            font-size: 14px; 
            margin-bottom: 20px; 
        }
        
        #display-box { 
            height: 320px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: 2px dashed #eee; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            background: #fffcf5; 
            overflow: hidden; 
            position: relative;
        }
        
        #job-img {
            width: 200px; 
            height: 200px; 
            object-fit: contain; 
            display: none; 
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1)); 
            animation: fadeIn 0.3s ease-out;
        }

        #job-name { 
            font-size: 36px; 
            font-weight: 900; 
            color: #2c3e50; 
            margin-top: 15px; 
        }
        
        /* 룰렛 텍스트 박스 */
        #roulette-box {
            font-size: 65px;
            font-weight: 900;
            color: #2c3e50;
            width: 300%;
            display: flex;
            white-space: nowrap;
        }
        
        /* 물음표가 일정한 간격으로 배치되고 무한으로 좌측 이동하는 클래스 (회전 속도 4초 -> 2초로 단축) */
        .rotating-question {
            display: flex;
            width: 100%;
            gap: 60px; 
            animation: infiniteLoop 2s linear infinite;
        }
        
        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 15px;
        }
        
        button { 
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            transition: 0.2s; 
            flex: 1; 
        }
        
        #action-btn { 
            background: var(--main-color); 
            color: white; 
            box-shadow: 0 4px 0 #d68910; 
        }
        
        #action-btn:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #d68910; 
        }
        
        #action-btn.stop { 
            background: var(--stop-color); 
            box-shadow: 0 4px 0 #c0392b; 
        }
        
        #reset-btn { 
            background: #dcdde1; 
            color: #7f8c8d; 
            flex: 0.4; 
        }
        
        button:hover { 
            opacity: 0.9; 
            transform: translateY(-2px); 
        }
        
        button:active { 
            transform: translateY(0); 
        }

        #log-container { 
            margin-top: 25px; 
            text-align: left; 
            border-top: 2px solid #f5f5f5; 
            padding-top: 15px; 
        }
        
        #log-title { 
            font-weight: bold; 
            font-size: 14px; 
            color: #333; 
            margin-bottom: 8px; 
            display: block; 
        }
        
        #log-list { 
            max-height: 120px; 
            overflow-y: auto; 
            font-size: 14px; 
            color: #777; 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }
        
        #log-list li { 
            padding: 6px 10px; 
            border-bottom: 1px solid #fafafa; 
            display: flex; 
            justify-content: space-between; 
            animation: slideIn 0.3s ease-out; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }

        /* 부드러운 무한 루프 키프레임 (속도 조절 반영) */
        @keyframes infiniteLoop {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Maple Job Picker</h1>
    <div id="counter">남은 직업: <span id="count-num">47</span> / 47</div>
    
    <div id="display-box">
        <img id="job-img" src="" alt="직업 이미지" onerror="this.src='https://ssl.nexon.com/s2/game/maplestory/renewal/common/bg_default.png'">
        
        <div id="roulette-box">
            <div class="rotating-question">
                <span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span>
                <span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span><span>?</span>
            </div>
        </div>
        
        <div id="job-name">준비되셨나요?</div>
    </div>

    <div class="btn-group">
        <button id="action-btn" onclick="toggleSpin()">시작</button>
        <button id="reset-btn" onclick="resetAll()">리셋</button>
    </div>

    <div id="log-container">
        <span id="log-title">뽑힌 기록:</span>
        <ul id="log-list"></ul>
    </div>
</div>

<script>
    const jobList = [
        "히어로", "팔라딘", "다크나이트", "불독", "썬콜", "비숍", "보우마스터", "신궁", "패스파인더", "나이트로드", "섀도어", "듀얼블레이드", "바이퍼", "캡틴", "캐논슈터",
        "소울마스터", "플레임위자드", "윈드브레이커", "나이트워커", "스트라이커", "미하일",
        "블래스터", "배틀메이지", "와일드헌터", "메카닉", "데몬슬레이어", "데몬어벤져", "제논",
        "아란", "에반", "루미너스", "메르세데스", "팬텀", "은월",
        "카이저", "카인", "카데나", "엔젤릭버스터",
        "아델", "일리움", "칼리", "아크",
        "호영", "라라",
        "제로", "키네시스", "렌"
    ];

    let jobs = [...jobList];
    let isSpinning = false;

    const actionBtn = document.getElementById('action-btn');
    const jobNameDisplay = document.getElementById('job-name');
    const jobImgDisplay = document.getElementById('job-img');
    const countDisplay = document.getElementById('count-num');
    const logList = document.getElementById('log-list');
    const rouletteBox = document.getElementById('roulette-box');

    function toggleSpin() {
        if (jobs.length === 0) return;

        if (!isSpinning) {
            isSpinning = true;
            actionBtn.innerText = "중지!";
            actionBtn.classList.add('stop');
            jobImgDisplay.style.display = "none";
            
            rouletteBox.style.display = "flex";
            jobNameDisplay.innerText = ""; 

            // 이미지 프리로딩
            jobs.forEach(job => {
                const img = new Image();
                img.src = `static/${job}.jpg`; // .png면 변경하세요
            });

            const rotatingDiv = document.querySelector('.rotating-question');
            rotatingDiv.classList.add('rotating-question');

        } else {
            stopSpin();
        }
    }

    function stopSpin() {
        isSpinning = false;
        actionBtn.innerText = "시작";
        actionBtn.classList.remove('stop');
        
        rouletteBox.style.display = "none";
        
        const finalIdx = Math.floor(Math.random() * jobs.length);
        const picked = jobs.splice(finalIdx, 1)[0];
        
        jobImgDisplay.src = `static/${picked}.jpg`; // .png면 변경하세요
        jobImgDisplay.style.display = "block";
        jobNameDisplay.innerText = picked;
        
        updateUI(picked);
    }

    function updateUI(picked) {
        countDisplay.innerText = jobs.length;
        const li = document.createElement('li');
        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        li.innerHTML = `<span><strong>${47 - jobs.length}.</strong> ${picked}</span> <small>${time}</small>`;
        logList.prepend(li);

        if (jobs.length === 0) {
            actionBtn.disabled = true;
            actionBtn.innerText = "완료";
            jobNameDisplay.innerText = "모든 직업 완료!";
        }
    }

    function resetAll() {
        if(confirm("모든 기록을 리셋하고 처음부터 다시 시작할까요?")) {
            location.reload();
        }
    }
</script>

</body>
</html>
